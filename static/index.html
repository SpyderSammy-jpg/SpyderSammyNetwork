<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="referrer" content="no-referrer" />
  <meta http-equiv="X-Content-Type-Options" content="nosniff" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="shortcut icon" id="tab-favicon" href="https://ssl.gstatic.com" />
  <title id="t">Home - Classroom</title>
  <link rel="stylesheet" href="/assets/css/global.css?v=6" />
  <link rel="stylesheet" href="/assets/css/h.css?v=01" />
  <link rel="stylesheet" href="/assets/css/nav.css?v=01" />
  
  <style>
    /* 1. Global Pitch Black Background */
    body, html, #particles-js {
      background: #000 !important;
      background-color: #000 !important;
      background-image: none !important;
      margin: 0;
      overflow: hidden;
      font-family: sans-serif;
    }

    /* 2. Red/Yellow Font Styling */
    .title {
      color: #ff0000 !important;
      -webkit-text-stroke: 1.5px #ffff00;
      font-weight: 900;
      font-size: 4rem;
      margin-bottom: 20px;
    }

    /* 3. New Navbar Styling */
    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 30px;
      background: rgba(0, 0, 0, 0.8);
      position: fixed;
      top: 0;
      width: 100%;
      z-index: 1000;
      box-sizing: border-box;
    }

    .nav-logo {
      font-size: 30px;
      cursor: pointer;
    }

    .nav-tabs {
      display: flex;
      gap: 25px;
    }

    .nav-tabs a {
      color: white;
      text-decoration: none;
      font-weight: 600;
      font-size: 16px;
      transition: color 0.3s;
    }

    .nav-tabs a:hover {
      color: #ff0000;
    }

    /* 4. Bottom Right Status Bar */
    .status-bar {
      position: fixed;
      bottom: 15px;
      right: 20px;
      display: flex;
      align-items: center;
      gap: 15px;
      color: white;
      font-family: monospace;
      font-size: 14px;
      background: rgba(0, 0, 0, 0.5);
      padding: 5px 10px;
      border-radius: 5px;
    }

    .status-dot {
      height: 10px;
      width: 10px;
      background-color: #00ff00;
      border-radius: 50%;
      display: inline-block;
      margin-right: 5px;
    }

    /* 5. AI Popup Styling */
    #ai-popup {
      display: none;
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 350px;
      height: 450px;
      background: #111;
      border: 2px solid #ff0000;
      z-index: 2000;
      border-radius: 10px;
      flex-direction: column;
      padding: 10px;
    }

    #ai-header { color: #ff0000; font-weight: bold; border-bottom: 1px solid #333; padding-bottom: 5px; margin-bottom: 10px; display: flex; justify-content: space-between; }
    #ai-messages { flex-grow: 1; overflow-y: auto; color: white; font-size: 14px; margin-bottom: 10px; }
    #ai-input { background: #000; border: 1px solid #444; color: white; padding: 8px; width: calc(100% - 18px); }
  </style>

</head>

<body class="center">
  <!-- New Navbar -->
  <nav class="navbar">
    <div class="nav-logo">🕷️</div>
    <div class="nav-tabs">
      <a href="https://spyder-network.vercel.app">Games</a>
      <a href="https://spyder-network.vercel.app">Apps</a>
      <a href="https://spyder-network.vercel.app">Browser</a>
      <a href="#" onclick="toggleAI()">AI</a>
      <a href="https://spyder-network.vercel.app">Settings</a>
    </div>
  </nav>

  <!-- Main Content -->
  <div id="particles-js">
    <div class="main">
      <h1 class="title">SpyderSammy</h1>
      <p id="splash"></p>
      <div class="search-container">
        <form id="fv" method="POST">
          <input id="input" class="truncate" placeholder="Search or enter a URL" type="text" />
        </form>
      </div>
    </div>
  </div>

  <!-- Status Bar (Clock, Status, FPS) -->
  <div class="status-bar">
    <span id="fps-display">FPS: 60</span>
    <span><span class="status-dot"></span>Online</span>
    <span id="clock">00:00:00</span>
  </div>

  <!-- Spyder AI Popup -->
  <div id="ai-popup">
    <div id="ai-header">Spyder AI <span style="cursor:pointer" onclick="toggleAI()">X</span></div>
    <div id="ai-messages">Welcome. How can I help you today?</div>
    <input type="text" id="ai-input" placeholder="Ask Spyder AI..." onkeypress="handleAI(event)">
  </div>

  <script>
    // Clock Logic
    function updateClock() {
      const now = new Date();
      document.getElementById('clock').innerText = now.toLocaleTimeString();
    }
    setInterval(updateClock, 1000);
    updateClock();

    // FPS Logic
    let frames = 0;
    let lastTime = performance.now();
    function checkFPS() {
      frames++;
      let time = performance.now();
      if (time >= lastTime + 1000) {
        document.getElementById('fps-display').innerText = "FPS: " + frames;
        frames = 0;
        lastTime = time;
      }
      requestAnimationFrame(checkFPS);
    }
    checkFPS();

    // AI Popup Logic
    function toggleAI() {
      const pop = document.getElementById('ai-popup');
      pop.style.display = (pop.style.display === 'flex') ? 'none' : 'flex';
    }

    function handleAI(e) {
      if (e.key === 'Enter') {
        const input = document.getElementById('ai-input');
        const msgs = document.getElementById('ai-messages');
        if (input.value.trim() === "") return;
        
        msgs.innerHTML += `<div><b>You:</b> ${input.value}</div>`;
        const userQuery = input.value.toLowerCase();
        input.value = "";

        // Simulated AI Response (Accurate Logic)
        setTimeout(() => {
          let response = "I am Spyder AI. I can assist with proxy navigation or general questions.";
          if(userQuery.includes("hello")) response = "Hello! How can I assist your browsing today?";
          if(userQuery.includes("time")) response = "It is currently " + new Date().toLocaleTimeString();
          msgs.innerHTML += `<div style="color:#ff0000"><b>Spyder AI:</b> ${response}</div>`;
          msgs.scrollTop = msgs.scrollHeight;
        }, 500);
      }
    }
  </script>

  <script src="assets/js/index-3.js"></script>
  <script src="/assets/js/h1.js"></script>
  <script src="./assets/mathematics/bundle.js?v=2025-04-15"></script>
  <script src="./assets/mathematics/config.js?v=2025-04-15"></script>
  <script src="/assets/js/m1.js"></script>
</body>
</html>
