<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="referrer" content="no-referrer" />
  <meta http-equiv="X-Content-Type-Options" content="nosniff" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="shortcut icon" id="tab-favicon" href="https://gstatic.com" />
  <title id="t">Home - Classroom</title>

  <!-- External Styles -->
  <link rel="stylesheet" href="/assets/css/global.css?v=6" />
  <link rel="stylesheet" href="/assets/css/h.css?v=01" />
  <link rel="stylesheet" href="/assets/css/nav.css?v=01" />

  <style>
    /* 1. Global Reset */
    html, body, #particles-js, .main, .center {
      background: #000 !important;
      background-color: #000 !important;
    }

    .title {
      color: #ff0000 !important;
      -webkit-text-stroke: 1.5px #ffff00;
      font-weight: 900;
      cursor: pointer;
      user-select: none;
    }

    /* 2. Admin System Popups */
    #admin-auth-popup, #edit-popup {
      display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
      background: #000; border: 2px solid #ff0000; padding: 25px; z-index: 10005;
      color: #ff0000; font-family: sans-serif; text-align: center; border-radius: 10px;
      box-shadow: 0 0 20px rgba(255,0,0,0.5);
    }
    #admin-auth-popup input, #edit-popup input {
      display: block; margin: 10px auto; padding: 10px; background: #111; border: 1px solid #ff0000; color: #fff; width: 220px;
    }

    /* 3. Crown Icon - Matching the Wrench Tool Box */
    #crown-btn {
      display: none; position: fixed; 
      top: 200px; /* Positioned exactly under the tools icon */
      right: 18px; 
      z-index: 10000;
      cursor: pointer; 
      border: 1.5px solid #ff0000; 
      border-radius: 8px; 
      padding: 6px;
      background: rgba(20, 20, 20, 0.9); 
      transition: right 0.3s ease;
    }
    #crown-btn img { width: 34px; height: 34px; filter: drop-shadow(0 0 2px red); }

    /* Admin Dropdown */
    #admin-menu {
      display: none; position: fixed; top: 260px; right: 18px; background: #000;
      border: 2px solid #ff0000; z-index: 10000; width: 140px; border-radius: 5px;
    }
    .admin-opt { padding: 12px; color: white; cursor: pointer; border-bottom: 1px solid #333; text-align: center; font-family: sans-serif; font-size: 14px; }
    .admin-opt:hover { background: #ff0000; color: black; }

    /* Admin Console */
    #admin-console {
      display: none; position: fixed; bottom: 80px; left: 20px; background: #000;
      border: 2px solid #ff0000; padding: 10px; z-index: 10001;
    }
    #admin-console input { background: #000; color: #0f0; border: none; outline: none; width: 300px; font-family: monospace; font-size: 16px; }
  </style>
</head>

<body class="center">
  <div class="f-nav"></div>

  <div id="particles-js">
    <div class="main">
      <h1 class="title" id="main-title">SpyderSammy</h1>
      <p id="splash"></p>
      <div class="search-container">
        <form id="fv" method="POST">
          <input id="input" class="truncate" placeholder="Searching doesn't work, click on the Tabs tab and type your url there!" type="text" />
        </form>
      </div>
    </div>
  </div>

  <!-- Popups -->
  <div id="admin-auth-popup">
    <h2 style="margin-bottom:20px;">Admin Login</h2>
    <input type="text" id="adm-user" placeholder="Username">
    <input type="password" id="adm-pass" placeholder="Password">
    <button onclick="checkAdmin()" style="background:#ff0000; color:black; border:none; padding:12px 25px; cursor:pointer; font-weight:bold; border-radius:5px; margin-top:10px;">Login</button>
  </div>

  <div id="crown-btn" onclick="toggleAdminMenu()">
    <img src="https://icons8.com" alt="Crown">
  </div>

  <div id="admin-menu">
    <div class="admin-opt" onclick="toggleConsole()">Console</div>
    <div class="admin-opt" onclick="toggleEdit()">Edit</div>
  </div>

  <div id="admin-console">
    <span onclick="this.parentElement.style.display='none'" style="color:red; float:right; cursor:pointer; font-weight:bold;">[X]</span>
    <input type="text" id="console-input" placeholder="Enter Command..." onkeydown="handleCmd(event)">
  </div>

  <div id="edit-popup">
    <h3>Admin Customization</h3>
    <p style="font-size:12px; margin-bottom:5px;">SITE NAME</p>
    <input type="text" id="name-input" placeholder="e.g. Sharvesh's Hub">
    <p style="font-size:12px; margin-bottom:5px;">SPLASH MESSAGE</p>
    <input type="text" id="splash-input" placeholder="e.g. Hello Admin!">
    <button onclick="saveAdminEdits()" style="background:#ff0000; color:black; border:none; padding:12px; cursor:pointer; width:100%; font-weight:bold; border-radius:5px;">Save Changes</button>
    <button onclick="toggleEdit()" style="background:#333; color:white; border:none; padding:10px; margin-top:10px; cursor:pointer; width:100%; border-radius:5px;">Cancel</button>
  </div>

  <!-- Scripts -->
  <script src="assets/js/index-3.js"></script>
  <script src="/assets/js/h1.js"></script>
  <script src="./assets/mathematics/bundle.js?v=2025-04-15"></script>
  <script src="./assets/mathematics/config.js?v=2025-04-15"></script>
  <script src="/assets/js/m1.js"></script>

  <script>
    let clickCount = 0;
    const titleEl = document.getElementById('main-title');

    // 1. Triple Click to Login
    titleEl.addEventListener('click', () => {
      clickCount++;
      if (clickCount === 3) {
        document.getElementById('admin-auth-popup').style.display = 'block';
        clickCount = 0;
      }
      setTimeout(() => { clickCount = 0; }, 800);
    });

    function checkAdmin() {
      if (document.getElementById('adm-user').value === "Sharvesh" && document.getElementById('adm-pass').value === "00010698") {
        localStorage.setItem('isAdmin', 'true');
        location.reload();
      }
    }

    // 2. Menu Controls
    function toggleAdminMenu() {
      const m = document.getElementById('admin-menu');
      m.style.display = (m.style.display === 'block') ? 'none' : 'block';
    }

    function toggleConsole() {
      document.getElementById('admin-console').style.display = 'block';
      document.getElementById('admin-menu').style.display = 'none';
      document.getElementById('console-input').focus();
    }

    function toggleEdit() {
      const e = document.getElementById('edit-popup');
      e.style.display = (e.style.display === 'block') ? 'none' : 'block';
      document.getElementById('admin-menu').style.display = 'none';
    }

    // 3. Command Console Logic
    function handleCmd(e) {
      if (e.key === 'Enter') {
        const cmd = e.target.value.trim();
        if (cmd === '/refresh') { location.reload(); }
        else if (cmd === '/home') { window.location.href = '/'; }
        else if (cmd === '/close') { window.close(); }
        e.target.value = '';
      }
    }

    // 4. Save Custom Edits
    function saveAdminEdits() {
      const newName = document.getElementById('name-input').value.trim();
      const newSplash = document.getElementById('splash-input').value.trim();
      if (newName) localStorage.setItem('customName', newName);
      if (newSplash) localStorage.setItem('customSplash', newSplash);
      applyAdminSettings();
      toggleEdit();
    }

    function applyAdminSettings() {
      const savedName = localStorage.getItem('customName');
      const savedSplash = localStorage.getItem('customSplash');
      if (savedName) titleEl.innerText = savedName;
      if (savedSplash) document.getElementById('splash').innerText = savedSplash;
      if (localStorage.getItem('isAdmin') === 'true') {
        document.getElementById('crown-btn').style.display = 'block';
      }
    }

    window.onload = applyAdminSettings;

    // 5. Sidebar Shift Logic - Keeps Crown moving with sidebar
    setInterval(() => {
      const side = document.querySelector('.sidebar');
      const offset = (side && side.style.display !== 'none') ? '325px' : '18px';
      document.getElementById('crown-btn').style.right = offset;
      document.getElementById('admin-menu').style.right = offset;
    }, 400);
  </script>
</body>
</html>
