<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="referrer" content="no-referrer" />
  <meta http-equiv="X-Content-Type-Options" content="nosniff" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="shortcut icon" id="tab-favicon" href="https://ssl.gstatic.com" />
  <title id="t">Home - Classroom</title>

  <!-- External Styles -->
  <link rel="stylesheet" href="/assets/css/global.css?v=6" />
  <link rel="stylesheet" href="/assets/css/h.css?v=01" />
  <link rel="stylesheet" href="/assets/css/nav.css?v=01" />

  <!-- Google Fonts for Real Decorative Themes -->
  <link href="https://googleapis.com" rel="stylesheet">

  <style>
    /* 1. Global Background - Removed !important to keep Taskbar/Navbar visible */
    html, body, #particles-js, .main, .center {
      background: #000;
      background-color: #000;
    }

    /* 2. Title Styling */
    .title {
      color: #ff0000 !important;
      -webkit-text-stroke: 1.5px #ffff00;
      font-weight: 900;
      cursor: pointer;
      user-select: none;
      transition: 0.4s all;
    }

    /* THEMED FONT CLASSES */
    .f-easter { font-family: 'Fredoka One', cursive; color: #ff99cc !important; -webkit-text-stroke: 1.5px #fff; }
    .f-halloween { font-family: 'Creepster', cursive; color: #ff4500 !important; -webkit-text-stroke: 1px #000; letter-spacing: 3px; }
    .f-birthday { font-family: 'Bungee Shade', cursive; color: #00ffff !important; -webkit-text-stroke: 1.5px #ff00ff; }
    .f-christmas { font-family: 'Mountains of Christmas', cursive; color: #2e8b57 !important; -webkit-text-stroke: 1.5px #ff0000; }

    /* 3. Admin Elements Style */
    #admin-auth-popup, #edit-popup {
      display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
      background: #000; border: 2px solid #ff0000; padding: 25px; z-index: 10005;
      color: #ff0000; font-family: sans-serif; text-align: center; border-radius: 8px;
    }
    #admin-auth-popup input, #edit-popup input, #edit-popup select {
      display: block; margin: 10px auto; padding: 8px; background: #111; border: 1px solid #ff0000; color: #fff; width: 220px;
    }

    /* Crown Icon - Matches Tools Box */
    #crown-btn {
      display: none; position: fixed; top: 120px; right: 20px; z-index: 10000;
      cursor: pointer; border: 1px solid #ff0000; border-radius: 8px; padding: 8px;
      background: rgba(0,0,0,0.8); transition: right 0.3s ease;
    }
    #crown-btn img { width: 30px; height: 30px; filter: drop-shadow(0 0 5px red); }

    /* Admin Dropdown Menu */
    #admin-menu {
      display: none; position: fixed; top: 175px; right: 20px; background: #000;
      border: 2px solid #ff0000; z-index: 10000; width: 140px; border-radius: 5px;
    }
    .admin-opt { padding: 12px; color: white; cursor: pointer; border-bottom: 1px solid #333; text-align: center; font-family: sans-serif; }
    .admin-opt:hover { background: #ff0000; color: black; }
  </style>
</head>

<body class="center">
  <div class="f-nav"></div>

  <div id="particles-js">
    <div class="main">
      <h1 class="title" id="main-title">SpyderSammy</h1>
      <p id="splash"></p>
      <div class="search-container">
        <form id="fv" method="POST">
          <input id="input" class="truncate" placeholder="Searching doesn't work..." type="text" />
        </form>
      </div>
    </div>
  </div>

  <!-- Popups -->
  <div id="admin-auth-popup">
    <h2>Admin Login</h2>
    <input type="text" id="adm-user" placeholder="Username">
    <input type="password" id="adm-pass" placeholder="Password">
    <button onclick="checkAdmin()" style="background:#ff0000; border:none; padding:10px 20px; cursor:pointer; font-weight:bold;">Login</button>
  </div>

  <div id="crown-btn" onclick="toggleAdminMenu()">
    <img src="https://icons8.com" alt="Crown">
  </div>

  <div id="admin-menu">
    <div class="admin-opt" onclick="toggleConsole()">Console</div>
    <div class="admin-opt" onclick="toggleEdit()">Edit</div>
    <div class="admin-opt" onclick="logoutAdmin()" style="color:red; font-weight:bold;">Logout</div>
  </div>

  <div id="edit-popup">
    <h3>Admin Customization</h3>
    <input type="text" id="name-input" placeholder="Custom Site Name">
    <select id="font-select">
      <option value="">Default Font</option>
      <option value="f-easter">Easter Theme</option>
      <option value="f-halloween">Halloween Theme</option>
      <option value="f-birthday">Birthday Theme</option>
      <option value="f-christmas">Christmas Theme</option>
    </select>
    <input type="text" id="yt-url" placeholder="YouTube URL">
    <input type="text" id="splash-input" placeholder="Splash Message">
    <button onclick="saveAdminEdits()" style="background:#ff0000; color:black; border:none; padding:10px; cursor:pointer; width:100%; font-weight:bold;">Save Changes</button>
    <button onclick="toggleEdit()" style="background:#333; color:white; border:none; padding:10px; margin-top:5px; cursor:pointer; width:100%;">Close</button>
  </div>

  <div id="admin-console" style="display:none; position:fixed; bottom:20px; left:20px; background:#000; border:2px solid red; padding:10px; z-index:10001;">
    <input type="text" id="console-input" placeholder="Command..." onkeydown="handleCmd(event)" style="background:#000; color:#0f0; border:none; outline:none; width:250px; font-family:monospace;">
  </div>

  <!-- Scripts -->
  <script src="assets/js/index-3.js"></script>
  <script src="/assets/js/h1.js"></script>
  <script src="./assets/mathematics/bundle.js?v=2025-04-15"></script>
  <script src="./assets/mathematics/config.js?v=2025-04-15"></script>
  <script src="/assets/js/m1.js"></script>

  <script>
    let clickCount = 0;
    const titleEl = document.getElementById('main-title');

    titleEl.addEventListener('click', () => {
      clickCount++;
      if (clickCount === 3) { document.getElementById('admin-auth-popup').style.display = 'block'; clickCount = 0; }
      setTimeout(() => { clickCount = 0; }, 800);
    });

    function checkAdmin() {
      if (document.getElementById('adm-user').value === "Sharvesh" && document.getElementById('adm-pass').value === "00010698") {
        localStorage.setItem('isAdmin', 'true');
        location.reload();
      }
    }

    function logoutAdmin() {
      localStorage.removeItem('isAdmin');
      location.reload();
    }

    function toggleAdminMenu() {
      const m = document.getElementById('admin-menu');
      m.style.display = (m.style.display === 'block') ? 'none' : 'block';
    }

    function toggleEdit() {
      const e = document.getElementById('edit-popup');
      e.style.display = (e.style.display === 'block') ? 'none' : 'block';
      document.getElementById('admin-menu').style.display = 'none';
    }

    function toggleConsole() {
      const c = document.getElementById('admin-console');
      c.style.display = (c.style.display === 'block') ? 'none' : 'block';
      document.getElementById('admin-menu').style.display = 'none';
    }

    function saveAdminEdits() {
      const n = document.getElementById('name-input').value;
      const f = document.getElementById('font-select').value;
      const s = document.getElementById('splash-input').value;
      let m = document.getElementById('yt-url').value;

      if (n) localStorage.setItem('cName', n);
      localStorage.setItem('cFont', f);
      if (s) localStorage.setItem('cSplash', s);
      if (m.includes('youtube.com')) {
        m = m.replace('youtube.com', 'yout-ube.com');
        localStorage.setItem('cMusic', m);
      }
      applyAdminSettings();
      toggleEdit();
    }

    function applyAdminSettings() {
      const name = localStorage.getItem('cName');
      const font = localStorage.getItem('cFont');
      const splash = localStorage.getItem('cSplash');
      const music = localStorage.getItem('cMusic');

      if (name) titleEl.innerText = name;
      if (font) titleEl.className = "title " + font;
      if (splash) document.getElementById('splash').innerText = splash;
      if (localStorage.getItem('isAdmin') === 'true') document.getElementById('crown-btn').style.display = 'block';

      if (music && !window.musicPlayed) {
        const audio = new Audio(music);
        document.body.addEventListener('click', () => { audio.play(); window.musicPlayed = true; }, {once: true});
      }
    }

    function handleCmd(e) {
      if (e.key === 'Enter') {
        const val = e.target.value;
        if (val === '/refresh') location.reload();
        if (val === '/home') window.location.href = '/';
        if (val === '/close') window.close();
        e.target.value = '';
      }
    }

    window.onload = applyAdminSettings;

    setInterval(() => {
      const side = document.querySelector('.sidebar');
      const offset = (side && side.style.display !== 'none') ? '325px' : '20px';
      document.getElementById('crown-btn').style.right = offset;
      document.getElementById('admin-menu').style.right = offset;
    }, 400);
  </script>
</body>
</html>
