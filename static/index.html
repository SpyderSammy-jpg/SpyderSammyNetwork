<script>
    // 1. Function to toggle the SpyderChat Popup
    function toggleSpyderChat() {
        const chat = document.getElementById('spyderchat-container');
        chat.style.display = (chat.style.display === 'none' || chat.style.display === '') ? 'block' : 'none';
    }

    // 2. Inject SpyderChat into your existing Tools Dropdown
    function injectSpyderTool() {
        // We look for your tools dropdown menu. 
        // NOTE: Adjust '.dropdown-content' or '.tools-menu' to match your actual CSS class
        const toolsMenu = document.querySelector('.dropdown-content') || document.querySelector('.tools-menu');
        
        if (toolsMenu) {
            const chatBtn = document.createElement('div');
            chatBtn.className = 'admin-opt'; // Using your existing style
            chatBtn.innerHTML = 'SpyderChat';
            chatBtn.onclick = toggleSpyderChat;
            toolsMenu.appendChild(chatBtn);
        }
    }

    // Run injection when page loads
    window.addEventListener('DOMContentLoaded', injectSpyderTool);

    // 3. Make the SpyderChat Window Draggable
    dragElement(document.getElementById("spyderchat-container"));

    function dragElement(elmnt) {
        var pos1 = 0, pos2 = 0, pos3 = 0, pos4 = 0;
        if (document.getElementById(elmnt.id + "header")) {
            document.getElementById(elmnt.id + "header").onmousedown = dragMouseDown;
        }
        function dragMouseDown(e) {
            e.preventDefault();
            pos3 = e.clientX;
            pos4 = e.clientY;
            document.onmouseup = closeDragElement;
            document.onmousemove = elementDrag;
        }
        function elementDrag(e) {
            e.preventDefault();
            pos1 = pos3 - e.clientX;
            pos2 = pos4 - e.clientY;
            pos3 = e.clientX;
            pos4 = e.clientY;
            elmnt.style.top = (elmnt.offsetTop - pos2) + "px";
            elmnt.style.left = (elmnt.offsetLeft - pos1) + "px";
            elmnt.style.bottom = "auto"; // Override the initial bottom positioning
        }
        function closeDragElement() {
            document.onmouseup = null;
            document.onmousemove = null;
        }
    }
</script>
