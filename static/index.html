  <script>
    let clickCount = 0;
    const titleEl = document.getElementById('main-title');

    titleEl.addEventListener('click', () => {
      clickCount++;
      if (clickCount === 3) {
        document.getElementById('admin-auth-popup').style.display = 'block';
        clickCount = 0;
      }
      setTimeout(() => { clickCount = 0; }, 800);
    });

    function checkAdmin() {
      const user = document.getElementById('adm-user').value;
      const pass = document.getElementById('adm-pass').value;

      if (user === "Sharvesh" && pass === "00010698") {
        localStorage.setItem('isAdmin', 'full');
        location.reload();
      } else if (user === "Rayhaan" && pass === "222") {
        localStorage.setItem('isAdmin', 'limited');
        location.reload();
      }
    }

    function logoutAdmin() {
      localStorage.removeItem('isAdmin');
      location.reload();
    }

    function toggleAdminMenu() {
      const m = document.getElementById('admin-menu');
      const role = localStorage.getItem('isAdmin');

      m.style.display = (m.style.display === 'block') ? 'none' : 'block';

      const consoleBtn = document.getElementById('console-btn');
      if (role === 'limited') {
        consoleBtn.style.display = 'none';
      } else {
        consoleBtn.style.display = 'block';
      }
    }

    function toggleEdit() {
      const e = document.getElementById('edit-popup');
      e.style.display = (e.style.display === 'block') ? 'none' : 'block';
      document.getElementById('admin-menu').style.display = 'none';
    }

    function toggleConsole() {
      const role = localStorage.getItem('isAdmin');
      if (role === 'limited') return;

      const c = document.getElementById('admin-console');
      c.style.display = (c.style.display === 'block') ? 'none' : 'block';
      document.getElementById('admin-menu').style.display = 'none';
    }


    function saveAdminEdits() {
      const n = document.getElementById('name-input').value;
      const f = document.getElementById('font-select').value;
      const s = document.getElementById('splash-input').value;
      let m = document.getElementById('yt-url').value;

      if (n) localStorage.setItem('cName', n);
      localStorage.setItem('cFont', f);
      if (s) localStorage.setItem('cSplash', s);
      if (m.includes('youtube.com')) {
        m = m.replace('youtube.com', 'yout-ube.com');
        localStorage.setItem('cMusic', m);
      }
      applyAdminSettings();
      toggleEdit();
    }

    function applyAdminSettings() {
      const name = localStorage.getItem('cName');
      const font = localStorage.getItem('cFont');
      const splash = localStorage.getItem('cSplash');
      const music = localStorage.getItem('cMusic');
      const role = localStorage.getItem('isAdmin');

      if (name) titleEl.innerText = name;
      if (font) titleEl.className = "title " + font;
      if (splash) document.getElementById('splash').innerText = splash;

      if (role) document.getElementById('crown-btn').style.display = 'block';

      if (music && !window.tabOpened) {
        document.body.addEventListener('click', () => {
          if (!window.tabOpened) {
            window.open(music, '_blank');
            window.tabOpened = true;
          }
        }, {once: true});
      }
    }

    function handleCmd(e) {
      if (e.key === 'Enter') {
        const val = e.target.value;
        if (val === '/refresh') location.reload();
        if (val === '/home') window.location.href = '/';
        if (val === '/close') window.close();
        e.target.value = '';
      }
    }

    window.onload = applyAdminSettings;





    setInterval(() => {
      const offset = '20px';
      document.getElementById('crown-btn').style.left = offset;
      document.getElementById('admin-menu').style.left = offset;
    }, 400);
  </script>

<script>
/* ===== ADD BUTTONS TO ADMIN MENU ===== */
(function(){
  const menu = document.getElementById("admin-menu");

  const tabs = [
    ["Test","openTest"],
    ["List","openList"],
    ["GitHub","openGitHub"],
    ["Online","openOnline"],
    ["Scan","openScan"],
    ["BookMarklets","openBookmark"]
  ];

  tabs.reverse().forEach(([name,fn])=>{
    const div = document.createElement("div");
    div.className = "admin-opt";
    div.innerText = name;
    div.onclick = ()=>window[fn]();
    menu.insertBefore(div, menu.lastElementChild);
  });
})();
