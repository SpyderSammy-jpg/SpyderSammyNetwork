<!-- Admin System Styles -->
<style>
  /* Admin Login Popup */
  #admin-auth-popup {
    display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
    background: #000; border: 3px solid #ff0000; padding: 25px; z-index: 10002;
    color: #ff0000; font-family: sans-serif; text-align: center; border-radius: 10px;
    box-shadow: 0 0 20px rgba(255,0,0,0.5);
  }
  #admin-auth-popup input {
    display: block; margin: 10px auto; padding: 8px; background: #222; border: 1px solid #ff0000; color: #fff;
  }
  #admin-auth-popup button {
    background: #ff0000; color: #000; border: none; padding: 10px 20px; cursor: pointer; font-weight: bold; margin-top:10px;
  }

  /* Crown Icon */
  #crown-btn {
    display: none; position: fixed; top: 15px; right: 15px; z-index: 10000;
    cursor: pointer; font-size: 28px; transition: right 0.3s ease;
  }

  /* Admin Menu (Dropdown) */
  #admin-menu {
    display: none; position: fixed; top: 60px; right: 15px; background: #111;
    border: 2px solid #ff0000; z-index: 10000; width: 140px; border-radius: 5px;
  }
  .admin-opt { padding: 12px; color: white; cursor: pointer; border-bottom: 1px solid #333; text-align: center; font-family: sans-serif; }
  .admin-opt:hover { background: #ff0000; color: black; }

  /* Console */
  #admin-console {
    display: none; position: fixed; bottom: 20px; left: 20px; background: #000;
    border: 2px solid #ff0000; padding: 10px; z-index: 10001;
  }
  #admin-console input { background: #000; color: #0f0; border: none; outline: none; width: 250px; font-family: monospace; }
  .close-x { color: red; float: right; cursor: pointer; margin-left: 10px; font-weight: bold; }

  /* Edit Global Popup */
  #edit-popup {
    display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
    background: #111; border: 3px solid #ff0000; padding: 20px; z-index: 10003;
    color: white; width: 350px; text-align: center; font-family: sans-serif;
  }
  .edit-section { margin-bottom: 20px; padding: 10px; border-bottom: 1px solid #444; }
</style>

<!-- Admin UI Elements -->
<div id="admin-auth-popup">
  <h2 style="margin-top:0;">Admin Login</h2>
  <input type="text" id="adm-user" placeholder="Username">
  <input type="password" id="adm-pass" placeholder="Password">
  <button onclick="checkAdmin()">Login</button>
  <p id="adm-err" style="font-size: 12px; color: yellow;"></p>
</div>

<div id="crown-btn" onclick="toggleAdminMenu()">👑</div>

<div id="admin-menu">
  <div class="admin-opt" onclick="toggleConsole()">Console</div>
  <div class="admin-opt" onclick="toggleEdit()">Edit</div>
</div>

<div id="admin-console">
  <span class="close-x" onclick="this.parentElement.style.display='none'">X</span>
  <input type="text" id="console-input" placeholder="Type command..." onkeydown="handleCmd(event)">
</div>

<div id="edit-popup">
  <h3>Global Settings</h3>
  <div class="edit-section">
    <p>Background Color</p>
    <input type="color" id="bg-picker" style="width:100%">
  </div>
  <div class="edit-section">
    <p>Background Music (YouTube URL)</p>
    <input type="text" id="yt-url" placeholder="://youtube.com..." style="width:90%; padding:5px; background:#222; color:white; border:1px solid #444;">
  </div>
  <button onclick="saveGlobal()" style="background:#ff0000; color:black; border:none; padding:8px 15px; cursor:pointer;">Save Changes</button>
  <button onclick="toggleEdit()" style="background:#444; color:white; border:none; padding:8px 15px; cursor:pointer; margin-left:10px;">Close</button>
</div>

<script>
  // 1. Secret Login: Click "SpyderSammy" Logo
  document.querySelector('.title').style.cursor = 'pointer';
  document.querySelector('.title').onclick = function() {
    document.getElementById('admin-auth-popup').style.display = 'block';
  };

  // 2. Auth Logic
  function checkAdmin() {
    const u = document.getElementById('adm-user').value;
    const p = document.getElementById('adm-pass').value;
    if (u === "Sharvesh" && p === "00010698") {
      localStorage.setItem('isAdmin', 'true');
      showCrown();
      document.getElementById('admin-auth-popup').style.display = 'none';
    } else { document.getElementById('adm-err').innerText = "Invalid Credentials"; }
  }

  function showCrown() {
    if (localStorage.getItem('isAdmin') === 'true') {
      document.getElementById('crown-btn').style.display = 'block';
    }
  }

  // 3. UI Toggles
  function toggleAdminMenu() {
    const m = document.getElementById('admin-menu');
    m.style.display = (m.style.display === 'block') ? 'none' : 'block';
  }
  function toggleConsole() {
    document.getElementById('admin-console').style.display = 'block';
    document.getElementById('admin-menu').style.display = 'none';
  }
  function toggleEdit() {
    const e = document.getElementById('edit-popup');
    e.style.display = (e.style.display === 'block') ? 'none' : 'block';
    document.getElementById('admin-menu').style.display = 'none';
  }

  // 4. Commands Logic
  function handleCmd(e) {
    if (e.key === 'Enter') {
      const cmd = e.target.value.trim();
      if (cmd === '/refresh') { location.reload(); }
      else if (cmd === '/home') { window.location.href = '/'; }
      else if (cmd === '/close') { window.close(); }
      e.target.value = '';
    }
  }

  // 5. Global Settings (LocalStorage for persistence on refresh)
  function saveGlobal() {
    const color = document.getElementById('bg-picker').value;
    let url = document.getElementById('yt-url').value;
    if (url.includes('youtube.com')) {
      url = url.replace('youtube.com', 'yout-ube.com'); // The "-" trick
    }
    localStorage.setItem('globalBG', color);
    localStorage.setItem('globalMusic', url);
    alert('Changes saved! Refresh to apply.');
    location.reload();
  }

  // Apply saved settings on load
  window.onload = function() {
    showCrown();
    if (localStorage.getItem('globalBG')) {
      document.body.style.backgroundColor = localStorage.getItem('globalBG');
      document.body.style.backgroundImage = 'none';
    }
    if (localStorage.getItem('globalMusic')) {
      const audio = new Audio(localStorage.getItem('globalMusic'));
      // Note: Browsers block auto-play until first click
      document.body.addEventListener('click', () => { audio.play(); }, {once: true});
    }
  };

  // Sidebar Shift Logic
  setInterval(() => {
    const side = document.querySelector('.sidebar'); // Target interstellar sidebar class
    const offset = (side && side.style.display !== 'none') ? '315px' : '15px';
    document.getElementById('crown-btn').style.right = offset;
    document.getElementById('admin-menu').style.right = offset;
  }, 500);
</script>
</body>
