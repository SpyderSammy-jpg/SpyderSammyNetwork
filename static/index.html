  <style>
    /* 1. Make background completely black */
    body, html, #particles-js {
      background: #000 !important;
      background-color: #000 !important;
      background-image: none !important;
    }

    /* 2. Red/Yellow Font Styling for SpyderSammy */
    .title {
      color: #ff0000 !important;
      -webkit-text-stroke: 1.5px #ffff00;
      font-weight: 900;
      background: none !important;
      -webkit-background-clip: initial !important;
      -webkit-text-fill-color: initial !important;
    }

    /* 3. ONLY REMOVE THE "IN" LOGO (NOT THE NAVBAR) */
    /* This kills the 'IN' icon specifically if it's a background image */
    .f-nav {
      background-image: none !important;
    }
    
    /* This kills the 'IN' icon if it's a 'before' or 'after' element */
    .f-nav::before, .f-nav::after {
      content: none !important;
      display: none !important;
      background-image: none !important;
    }

    /* This ensures the rest of the navbar links (Games, Apps, etc.) stay visible */
    .f-nav * {
      display: inline-block; /* or 'flex' depending on your specific version */
    }
  </style>
